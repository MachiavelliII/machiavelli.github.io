name: "Medium Blogs"

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 5 minutes
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the local repository
      - name: Checkout local repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.ACTIONS_TOKEN }} # Use your configured token

      # Step 2: Set up Ruby environment
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3 # Specify Ruby version
          bundler-cache: true # Cache Ruby gems for faster builds

      # Step 3: Install dependencies
      - name: Install dependencies
        run: bundle install

      # Step 4: Import blogs from Medium
      - name: Import blogs from Medium
        run: |
          bundle exec jekyll import medium --username machiavellli

      # Step 5: Commit and push changes if there are any
      - name: Commit and push changes
        run: |
          git add _posts
          if ! (git diff --staged --quiet --exit-code); then
              git config --global user.name "GitHub Actions"
              git config --global user.email "actions@github.com"
              git commit -m 'Mediuming: Imported blogs from Medium'
              git push origin main
          fi
